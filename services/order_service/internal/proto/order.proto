syntax = "proto3";

package order;

option go_package = "order_service/internal/proto";

message Order {
  string id = 1;
  string user_id = 2;
  string product_name = 3;
  int32  quantity = 4;
  string status = 5;
}

message CreateOrderRequest {
  string user_id = 1;
  string product_name = 2;
  int32  quantity = 3;
}
message CreateOrderResponse { Order order = 1; }

message GetOrderRequest { string id = 1; }
message GetOrderResponse { Order order = 1; }

message ListOrdersRequest {}
message ListOrdersResponse { repeated Order orders = 1; }

message UpdateOrderRequest {
  string id = 1;
  string product_name = 2;
  int32  quantity = 3;
  string status = 4;
}
message UpdateOrderResponse { Order order = 1; }

message DeleteOrderRequest { string id = 1; }
message DeleteOrderResponse { string message = 1; }

service OrderService {
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);
  rpc UpdateOrder(UpdateOrderRequest) returns (UpdateOrderResponse);
  rpc DeleteOrder(DeleteOrderRequest) returns (DeleteOrderResponse);
}
