version: '3.8'

services:
  # ──────────────────────────────────────────
  # 0. POSTGRES DATABASE
  # ──────────────────────────────────────────
  postgres-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: assignment_db
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U devuser -d assignment_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # 1. API GATEWAY (GraphQL)
  # ──────────────────────────────────────────
  api-gateway:
    build:
      context: ./api_gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - USER_SERVICE_ADDR=user-server:50051
      - ORDER_SERVICE_ADDR=order-server:50052
      - TRACKING_SERVICE_ADDR=tracking-server:50053
    depends_on:
      - user-server
      - order-server
      - tracking-server

  # ──────────────────────────────────────────
  # 2. USER SERVICE (gRPC)
  # ──────────────────────────────────────────
  user-server:
    build:
      context: ./services/user_service
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgres://devuser:devpassword@postgres-db:5432/assignment_db?sslmode=disable
    expose:
      - "50051"
    depends_on:
      postgres-db:
        condition: service_healthy

  # ──────────────────────────────────────────
  # 3. ORDER SERVICE (gRPC)
  # ──────────────────────────────────────────
  order-server:
    build:
      context: ./services/order_service
      dockerfile: Dockerfile
    environment:
      - USER_SERVICE_ADDR=user-server:50051
      - DATABASE_URL=postgres://devuser:devpassword@postgres-db:5432/assignment_db?sslmode=disable
    expose:
      - "50052"
    depends_on:
      postgres-db:
        condition: service_healthy
      user-server:
        condition: service_started

  # ──────────────────────────────────────────
  # 4. TRACKING SERVICE (gRPC)
  # ──────────────────────────────────────────
  tracking-server:
    build:
      context: ./services/tracking_service
      dockerfile: Dockerfile
    environment:
      - ORDER_SERVICE_ADDR=order-server:50052
      - DATABASE_URL=postgres://devuser:devpassword@postgres-db:5432/assignment_db?sslmode=disable
    expose:
      - "50053"
    depends_on:
      postgres-db:
        condition: service_healthy
      order-server:
        condition: service_started
